<div class="search-wrap">
  <div class="search-field">
    <svg class="search-icon" viewBox="0 0 20 20" fill="currentColor">
      <path
        fill-rule="evenodd"
        d="M9 3.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 9a7 7 0
           1112.452 4.391l3.328 3.329a.75.75 0 11-1.06 1.06l-3.329-3.328A7 7 0 012 9z"
        clip-rule="evenodd"
      />
    </svg>

    <input
      type="text"
      class="search-input"
      placeholder="Search by product name or code…"
      [ngModel]="store.searchQuery()"
      (ngModelChange)="store.updateSearch($event)"
      (focus)="dropdownOpen.set(true)"
      (blur)="onBlur()"
    />

    @if (store.hasQuery()) {
      <button class="clear-btn" (mousedown)="store.clearSearch()">✕</button>
    }
  </div>

  <!-- Dropdown results -->
  @if (dropdownOpen() && store.hasQuery()) {
    <div class="dropdown">
      @if (store.hasResults()) {
        @for (product of store.filteredProducts(); track product.productCode) {
          <button class="dropdown-item" (mousedown)="selectProduct(product)">
            <span class="item-code">{{ product.productCode }}</span>
            <span class="item-name">{{ product.productName }}</span>
            <span class="item-price">₹{{ product.unitPrice | number }}</span>
          </button>
        }
      } @else {
        <div class="dropdown-empty">
          No products match "{{ store.searchQuery() }}"
        </div>
      }
    </div>
  }
</div>
